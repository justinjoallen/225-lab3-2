apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-deployment
  namespace: allenjj2-sp26
spec:
  replicas: 1  # Number of NGINX pods to run
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: allenjj2/225-lab3-2:latest   # <-------change this!
        ports:
        - containerPort: 80  # Expose NGINX on port 80      
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  namespace: allenjj2-sp26
spec:
  rules: 
  - host: allenjj2-lab3-2.apps.csi.miamioh.edu
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend: 
          service:
            name: dev-service
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dev-service
  namespace: allenjj2-sp26
spec:
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  selector:
    app: nginx 
